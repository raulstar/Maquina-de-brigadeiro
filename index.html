<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bem-vindo ao meu site</h1>
    </header>

    <main>
        <h2>Sobre</h2>
        <p>Esta é uma página HTML simples como exemplo.</p>

        <h2>Contato</h2>
        <p>Email: exemplo@email.com</p>
    </main>

    <footer>
        <p>© 2026 - Meu Site</p>
    </footer>

</body>
</html>
